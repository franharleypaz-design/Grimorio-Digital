<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil - Grimorio de Mitología</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="banner.css?v=1.1">
    <link rel="stylesheet" href="perfil.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        /* RESET CRÍTICO: Evita que el flex-column de style.css rompa el header */
        body.body-perfil {
            background: 
                linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.8)),
                url('img/fondo-nuevo-grimorio.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            margin: 0;
            display: block !important; 
        }

        /* Header simplificado: Sin Banner, solo para el botón de usuario */
        .main-header {
            position: relative;
            width: 100%;
            height: 80px; 
            display: flex !important;
            justify-content: flex-end;
            align-items: center;
            padding: 0 30px;
            z-index: 1000;
            background: transparent;
        }

        /* Estabilización del Layout Principal */
        .perfil-main {
            margin-top: 20px; 
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: calc(100vh - 100px);
            padding: 20px;
            position: relative;
            z-index: 10;
        }

        .perfil-card {
            background: rgba(10, 10, 10, 0.9);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid #d4af37;
            padding: 40px;
            width: 100%;
            max-width: 1000px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 50px rgba(0, 0, 0, 1);
            position: relative;
            border-radius: 8px;
        }

        /* Control estricto del Avatar */
        .avatar-container-large {
            position: relative;
            width: 180px !important;
            height: 180px !important;
            min-width: 180px;
            min-height: 180px;
            cursor: pointer;
            border-radius: 50%;
            overflow: hidden;
            border: 3px solid #d4af37;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
            transition: 0.3s;
            margin: 0 auto 20px auto;
        }

        #profile-img-large {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
    </style>
</head>

<body class="body-perfil">
    <header class="main-header">
        <div class="top-bar-container" style="position: relative;">
            <div class="top-bar-right">
                <button id="btn-login" class="btn-místico">ASCENDER</button>
                <div id="user-logged" style="display: none;">
                    <span id="display-name-text">Cargando...</span>
                    <img id="user-photo" class="avatar-header" src="img/avatar-default.png" alt="Avatar">

                    <div class="user-dropdown-menu" id="user-dropdown">
                        <div class="dropdown-header-ms">
                            <span style="font-weight: 700; color: #666; font-size: 0.8rem;">GRIMORIO DIGITAL</span>
                            <button id="btn-logout" class="btn-cerrar-sesion-ms">Cerrar sesión</button>
                        </div>
                        <div class="dropdown-body-ms">
                            <img id="user-photo-large-dropdown" class="avatar-large-ms" src="img/avatar-default.png" alt="Avatar">
                            <div class="user-info-ms">
                                <h4 id="user-full-name">Invocador</h4>
                                <p id="user-email">...</p>
                                <a href="perfil.html" class="link-cuenta-ms">Mi cuenta de Grimorio</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="perfil-main">
        <div class="perfil-card">
            <div id="perfil-view-wrapper">
                
                <div class="invocador-column" style="flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: space-between; text-align: center;">
                    <div id="invocador-view" class="view-block" style="display: flex; flex-direction: column; align-items: center; width: 100%; flex: 1; justify-content: center;">
                        <div class="avatar-container-large" onclick="abrirGaleria()">
                            <img id="profile-img-large" src="img/avatar-default.png" onerror="this.src='img/avatar-default.png'">
                            <div class="change-photo-overlay">CAMBIAR ESENCIA</div>
                        </div>

                        <h2 class="card-nick" id="card-nick-display" style="margin: 10px 0; width: 100%; font-family: 'Cinzel'; color: #d4af37;">INVOCANDO...</h2>
                        
                        <div class="card-desc-container">
                            <p id="card-real-name-display" style="display:none;"></p>
                            <p id="card-birth-display" style="display:none;"></p>
                            <p id="card-sexo-display" style="display:none;"></p>
                            <div class="card-bio" id="card-desc-display" style="margin: 10px auto; max-width: 320px; line-height: 1.6; color: #ccc;">Leyendo crónicas...</div>
                        </div>
                        <p class="perfil-status" id="invocador-rango" style="color: #d4af37; font-size: 0.8rem; letter-spacing: 2px;">RANGO: INICIADO</p>
                    </div>

                    <div class="boton-base-container" style="width: 100%; margin-top: 20px;">
                        <button id="btn-edit-profile" class="btn-dorado-perfil">MODIFICAR DATOS</button>
                    </div>
                </div>

                <div class="data-separator" style="width: 1px; background: linear-gradient(to bottom, transparent, #d4af37, transparent); align-self: stretch; opacity: 0.4; margin: 0 30px;"></div>

                <div class="data-column" style="flex: 1.2; display: flex; flex-direction: column; justify-content: space-between; padding-left: 40px;">
                    <div style="flex: 1; display: flex; flex-direction: column; justify-content: center;">
                        <div class="perfil-registro-bloque">
                            <h3 class="registro-titulo">⚔️ ESTRATEGIA PRINCIPAL</h3>
                            <div id="main-deck-container" class="folders-list"></div>
                        </div>

                        <div class="perfil-registro-bloque">
                            <h3 class="registro-titulo">📁 INVENTARIO DESTACADO</h3>
                            <div id="featured-folder-container" class="folders-list"></div>
                        </div>

                        <div class="perfil-registro-bloque">
                            <h3 class="registro-titulo">🔗 REGISTROS COPIADOS</h3>
                            <div id="copied-decks-container" class="folders-list"></div>
                        </div>
                    </div>

                    <div class="boton-base-container" style="width: 100%; margin-top: 20px;">
                        <button class="btn-dorado-perfil" onclick="location.href='grimorio.html'">ENTRAR AL SANTUARIO</button>
                    </div>
                </div>
            </div>

            <div id="perfil-edit-form" class="edit-mode-container" style="display: none;">
                <h2 class="perfil-title" style="text-align: center; color: #d4af37; font-family: 'Cinzel'; margin-bottom: 20px;">REESCRIBIR ESENCIA</h2>
                <hr class="perfil-title-divider" style="border-color: rgba(212,175,55,0.3); margin-bottom: 25px;">
                
                <div class="form-grid-image-match" style="display: flex; flex-direction: column; gap: 15px; max-width: 500px; margin: 0 auto;">
                    <div class="input-group">
                        <label style="color: #d4af37; font-size: 0.7rem; font-weight: bold;">NOMBRE COMPLETO</label>
                        <input type="text" id="edit-realname" style="width:100%; padding: 12px; background: #000; border: 1px solid #444; color: #fff;">
                    </div>
                    <div class="input-group">
                        <label style="color: #d4af37; font-size: 0.7rem; font-weight: bold;">NICKNAME</label>
                        <input type="text" id="edit-nickname" style="width:100%; padding: 12px; background: #000; border: 1px solid #444; color: #fff;">
                    </div>
                    <div class="input-row-inline" style="display: flex; gap: 15px;">
                        <div class="input-group" style="flex: 1;">
                            <label style="color: #d4af37; font-size: 0.7rem; font-weight: bold;">FECHA NACIMIENTO</label>
                            <input type="date" id="edit-birth" style="width:100%; padding: 12px; background: #000; border: 1px solid #444; color: #fff;">
                        </div>
                        <div class="input-group" style="flex: 1;">
                            <label style="color: #d4af37; font-size: 0.7rem; font-weight: bold;">SEXO</label>
                            <select id="edit-sexo" style="width:100%; padding: 12px; background: #000; border: 1px solid #444; color: #fff;">
                                <option value="MÍSTICO">MÍSTICO</option>
                                <option value="HOMBRE">HOMBRE</option>
                                <option value="MUJER">MUJER</option>
                                <option value="OTRO">OTRO</option>
                            </select>
                        </div>
                    </div>
                    <div class="input-group">
                        <label style="color: #d4af37; font-size: 0.7rem; font-weight: bold;">BIOGRAFÍA / LEYENDA</label>
                        <textarea id="edit-bio" rows="3" maxlength="150" style="width:100%; padding: 12px; background: #000; border: 1px solid #444; color: #fff; resize: none;"></textarea>
                    </div>
                </div>

                <div class="edit-buttons-match" style="display: flex; gap: 15px; margin-top: 30px; justify-content: center;">
                    <button onclick="actualizarPerfil()" class="btn-dorado-perfil" style="flex:1;">VINCULAR</button>
                    <button id="btn-cancel-edit" type="button" class="btn-abortar-match" style="flex: 1; background: #8b1a1a; color: #fff; border: 1px solid #d4af37; cursor: pointer; font-family: 'Cinzel'; padding: 10px; border-radius: 4px;">ABORTAR</button>
                </div>
            </div>
        </div>
    </main>

    <div id="modal-galeria" class="avatar-gallery" style="display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #0a0a0a; border: 2px solid #d4af37; padding: 30px; z-index: 5000; width: 90%; max-width: 450px;">
        <h3 style="color: #d4af37; font-family: 'Cinzel'; text-align: center; margin-bottom: 20px;">ELIGE TU ESENCIA</h3>
        <div class="avatar-grid" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; max-height: 350px; overflow-y: auto; padding: 10px;">
            <img src="img/avatares/chesca_dark.png" class="avatar-option" onclick="seleccionarAvatar(this.src)">
            <img src="img/avatares/guerrero.png" class="avatar-option" onclick="seleccionarAvatar(this.src)">
            <img src="img/avatares/mago.png" class="avatar-option" onclick="seleccionarAvatar(this.src)">
            <img src="img/avatares/elfo.png" class="avatar-option" onclick="seleccionarAvatar(this.src)">
            <img src="img/avatares/caballero.png" class="avatar-option" onclick="seleccionarAvatar(this.src)">
            <img src="img/avatares/dragon.png" class="avatar-option" onclick="seleccionarAvatar(this.src)">
            <img src="img/avatares/bestia.png" class="avatar-option" onclick="seleccionarAvatar(this.src)">
            <img src="img/avatares/shinji.png" class="avatar-option" onclick="seleccionarAvatar(this.src)">
            <img src="img/avatares/snow.png" class="avatar-option" onclick="seleccionarAvatar(this.src)">
            <img src="img/avatares/ebor.png" class="avatar-option" onclick="seleccionarAvatar(this.src)">
        </div>
        <button onclick="cerrarGaleria()" class="btn-dorado-perfil" style="margin-top: 20px;">CERRAR SANTUARIO</button>
    </div>

    <div id="toast-container"></div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="app.js"></script>
    <script src="perfil.js"></script>
</body>
</html>
