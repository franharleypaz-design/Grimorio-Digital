<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil - Grimorio de Mitología</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="perfil.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* Estilos críticos para el Layout de Registros */
        .perfil-registro-bloque {
            margin-bottom: 25px;
            border-left: 2px solid rgba(212, 175, 55, 0.2);
            padding-left: 15px;
        }

        .registro-titulo {
            font-size: 0.75rem !important;
            color: var(--accent);
            letter-spacing: 2px;
            margin-bottom: 10px !important;
            text-transform: uppercase;
            font-family: 'Cinzel', serif;
        }

        /* CLASE UNIFICADA PARA BOTONES DORADOS CON BRILLO */
        .btn-dorado-perfil {
            background: linear-gradient(to bottom, #d4af37, #b8860b);
            color: #000;
            border: 1px solid #fff;
            padding: 10px 20px;
            font-family: 'Cinzel', serif;
            font-weight: bold;
            font-size: 0.8rem;
            cursor: pointer;
            text-transform: uppercase;
            border-radius: 4px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.4), inset 0 0 5px rgba(255, 255, 255, 0.5);
            transition: 0.3s;
            letter-spacing: 1px;
            width: 100%;
            max-width: 280px;
            display: inline-block;
            text-align: center;
        }

        .btn-dorado-perfil:hover {
            background: #fff;
            color: #000;
            box-shadow: 0 0 20px var(--accent);
            transform: translateY(-2px);
        }

        /* Contenedores de botones para alineación base */
        .boton-base-container {
            width: 100%;
            display: flex;
            justify-content: center;
            margin-top: 20px;
            padding-bottom: 5px;
        }

        /* Estabilización del Layout Principal */
        #perfil-view-wrapper {
            display: flex;
            width: 100%;
            align-items: stretch;
            gap: 0;
            min-height: 450px;
        }

        /* Ajustes de Avatar */
        .avatar-container-large {
            position: relative;
            width: 180px;
            height: 180px;
            cursor: pointer;
            border-radius: 50%;
            overflow: hidden;
            border: 3px solid var(--accent);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
            transition: 0.3s;
            margin: 0 auto 20px auto;
        }

        .avatar-container-large:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px var(--accent);
        }

        #profile-img-large {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .change-photo-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(0, 0, 0, 0.7);
            color: var(--accent);
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            padding: 8px 0;
            text-align: center;
            opacity: 0;
            transition: 0.3s;
        }

        .avatar-container-large:hover .change-photo-overlay {
            opacity: 1;
        }
    </style>
</head>

<body class="body-perfil">
    <header class="main-header">
        <div class="header-identity-block">
            <div class="logo-container" onclick="location.href='grimorio.html'" style="cursor:pointer;">
                <img src="img/logo-Grimorio-digital.png" alt="Grimorio Digital" class="main-logo">
                <div class="logo-text">
                    <h1>GRIMORIO <span class="accent-on-light">DIGITAL</span></h1>
                    <p class="subtitle">SANTUARIO DE ESTRATEGIA</p>
                </div>
            </div>
        </div>

        <div class="header-action-block">
            <div id="user-logged">
                <span id="display-name-text"></span>
                <img id="user-photo" class="avatar-header" src="img/avatar-default.png"
                    onclick="location.href='perfil.html'">
                <button id="btn-logout" class="btn-salir">SALIR</button>
            </div>
        </div>
    </header>
    <main class="perfil-main">
        <div class="perfil-card">
            <div id="perfil-view-wrapper">

                <div class="invocador-column"
                    style="flex: 1; padding-right: 40px; display: flex; flex-direction: column; align-items: center; justify-content: space-between; text-align: center;">
                    <div id="invocador-view" class="view-block"
                        style="display: flex; flex-direction: column; align-items: center; width: 100%; flex: 1; justify-content: center;">

                        <div class="avatar-container-large" onclick="abrirGaleria()">
                            <img id="profile-img-large" src="img/avatar-default.png"
                                onerror="this.src='img/avatar-default.png'">
                            <div class="change-photo-overlay">CAMBIAR</div>
                        </div>

                        <h2 class="card-nick" id="card-nick-display" style="margin: 10px 0; width: 100%;">INVOCANDO...
                        </h2>

                        <div class="card-desc-container">
                            <p id="card-real-name-display" style="display:none;"></p>
                            <p id="card-birth-display" style="display:none;"></p>
                            <p id="card-sexo-display" style="display:none;"></p>
                            <div class="card-bio" id="card-desc-display"
                                style="margin: 10px auto; max-width: 320px; line-height: 1.6;">Leyendo crónicas...</div>
                        </div>

                        <p class="perfil-status" id="invocador-rango">RANGO: INICIADO</p>
                    </div>

                    <div class="boton-base-container">
                        <button id="btn-edit-profile" class="btn-dorado-perfil">MODIFICAR DATOS</button>
                    </div>
                </div>

                <div class="data-separator"></div>

                <div class="data-column"
                    style="flex: 1; padding-left: 40px; display: flex; flex-direction: column; justify-content: space-between;">

                    <div style="flex: 1; display: flex; flex-direction: column; justify-content: center;">
                        <div class="perfil-registro-bloque">
                            <h3 class="registro-titulo">⚔️ ESTRATEGIA PRINCIPAL</h3>
                            <div id="main-deck-container" class="folders-list"></div>
                        </div>

                        <div class="perfil-registro-bloque">
                            <h3 class="registro-titulo">📁 INVENTARIO DESTACADO</h3>
                            <div id="featured-folder-container" class="folders-list"></div>
                        </div>

                        <div class="perfil-registro-bloque">
                            <h3 class="registro-titulo">🔗 REGISTROS COPIADOS</h3>
                            <div id="copied-decks-container" class="folders-list"></div>
                        </div>
                    </div>

                    <div class="boton-base-container">
                        <button class="btn-dorado-perfil" onclick="location.href='grimorio.html'">
                            ENTRAR AL SANTUARIO
                        </button>
                    </div>

                </div>
            </div>

            <div id="perfil-edit-form" class="edit-mode-container" style="display: none;">
                <h2 class="perfil-title">REESCRIBIR ESENCIA</h2>
                <hr class="perfil-title-divider">
                <div class="form-grid-image-match">
                    <div class="input-group">
                        <label>NOMBRE COMPLETO</label>
                        <input type="text" id="edit-realname">
                    </div>
                    <div class="input-group">
                        <label>NICKNAME</label>
                        <input type="text" id="edit-nickname">
                    </div>
                    <div class="input-row-inline" style="display: flex; gap: 15px;">
                        <div class="input-group" style="flex: 1;">
                            <label>FECHA NACIMIENTO</label>
                            <input type="date" id="edit-birth">
                        </div>
                        <div class="input-group" style="flex: 1;">
                            <label>SEXO</label>
                            <select id="edit-sexo">
                                <option value="MÍSTICO">MÍSTICO</option>
                                <option value="HOMBRE">HOMBRE</option>
                                <option value="MUJER">MUJER</option>
                                <option value="OTRO">OTRO</option>
                            </select>
                        </div>
                    </div>
                    <div class="input-group">
                        <label>BIOGRAFÍA / LEYENDA</label>
                        <textarea id="edit-bio" rows="3" maxlength="150"></textarea>
                    </div>
                </div>
                <div class="edit-buttons-match">
                    <button onclick="actualizarPerfil()" class="btn-vincular-match">VINCULAR</button>
                    <button id="btn-cancel-edit" class="btn-abortar-match">ABORTAR</button>
                </div>
            </div>
        </div>
    </main>

    <div id="toast-container"></div>

    <div id="modal-galeria" class="avatar-gallery" style="display: none;">
        <h3 class="perfil-title" style="text-align: center; margin-bottom: 20px;">ELIGE TU ESENCIA</h3>
        <div class="avatar-grid">
            <img src="img/avatares/chesca_dark.png" class="avatar-option" onclick="seleccionarAvatar(this.src)">
            <img src="img/avatares/guerrero.png" class="avatar-option" onclick="seleccionarAvatar(this.src)">
            <img src="img/avatares/mago.png" class="avatar-option" onclick="seleccionarAvatar(this.src)">
            <img src="img/avatares/elfo.png" class="avatar-option" onclick="seleccionarAvatar(this.src)">
            <img src="img/avatares/caballero.png" class="avatar-option" onclick="seleccionarAvatar(this.src)">
            <img src="img/avatares/dragon.png" class="avatar-option" onclick="seleccionarAvatar(this.src)">
            <img src="img/avatares/bestia.png" class="avatar-option" onclick="seleccionarAvatar(this.src)">
            <img src="img/avatares/shinji.png" class="avatar-option" onclick="seleccionarAvatar(this.src)">
            <img src="img/avatares/snow.png" class="avatar-option" onclick="seleccionarAvatar(this.src)">
            <img src="img/avatares/ebor.png" class="avatar-option" onclick="seleccionarAvatar(this.src)">
        </div>
        <button onclick="cerrarGaleria()" class="btn-salir" style="width: 100%;">CERRAR SANTUARIO</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="app.js"></script>
    <script src="perfil.js"></script>

</body>

</html>
