<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Álbum de Colección - Grimorio Digital</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="album.css">
</head>

<body class="body-album modo-album">
    <header class="main-header">
        <div class="header-identity-block">
            <div class="logo-container" onclick="location.href='grimorio.html'" style="cursor:pointer;">
                <img src="img/logo-Grimorio-digital.png" alt="Grimorio Digital" class="main-logo">
                <div class="logo-text">
                    <h1>GRIMORIO <span class="accent-on-light">DIGITAL</span></h1>
                    <p class="subtitle">SANTUARIO DE ESTRATEGIA</p>
                </div>
            </div>
        </div>

        <div class="header-action-block">
            <div id="user-logged">
                <span id="display-name-text"></span>
                <img id="user-photo" class="avatar-header" src="img/avatar-default.png"
                    onclick="location.href='perfil.html'">
                <button id="btn-logout" class="btn-salir">SALIR</button>
            </div>
        </div>
    </header>

    <main class="album-layout-container">

        <aside class="sidebar">
            <div class="filter-group">
                <h3>EXHIBICIÓN</h3>
                <button id="btn-show-owned" class="btn-exhibicion" onclick="toggleMostrarCarpeta()">
                    🗂️ VER MI CARPETA
                </button>
                <button id="btn-show-favs" class="btn-exhibicion" onclick="toggleMostrarFavoritos()">
                    ⭐ FAVORITOS
                </button>
            </div>

            <div class="filter-group">
                <h3>BUSCADOR</h3>
                <input type="text" id="main-search" placeholder="Nombre o Habilidad..." oninput="filtrarCartas()">
            </div>

            <div class="filter-group">
                <h3>FILTRAR TIPO</h3>
                <select id="tipo-filter" onchange="filtrarCartas()">
                    <option value="">TODOS</option>
                    <option value="Aliado">ALIADO</option>
                    <option value="Talismán">TALISMÁN</option>
                    <option value="Oro">ORO</option>
                    <option value="Arma">ARMA</option>
                    <option value="Tótem">TÓTEM</option>
                </select>
            </div>

            <div class="filter-group">
                <h3>FILTRAR RAZA</h3>
                <select id="raza-filter" onchange="filtrarCartas()">
                    <option value="">TODAS</option>
                    <option value="Caballero">CABALLERO</option>
                    <option value="Guerrero">GUERRERO</option>
                    <option value="Mago">MAGO</option>
                    <option value="Sacerdote">SACERDOTE</option>
                    <option value="Sombra">SOMBRA</option>
                    <option value="Bestia">BESTIA</option>
                    <option value="Dragón">DRAGÓN</option>
                    <option value="Faerie">FAERIE</option>
                    <option value="Ancestral">ANCESTRAL</option>
                </select>
            </div>
        </aside>

        <section class="content-gallery">
            <div class="card-grid" id="card-display">
            </div>
        </section>

        <aside class="right-content">
            <div class="deck-stats-header-album">
                <h2 class="content-header-title">CONTENIDO</h2>
                <div class="stats-bar-album">
                    CARTAS TOTALES: <span id="total-cards-album">0</span>
                </div>
            </div>

            <div id="deck-list-container">
            </div>

            <button class="btn-save-album" onclick="guardarMazoFirebase()">
                GUARDAR CAMBIOS EN ÁLBUM
            </button>
        </aside>

    </main>

    <div id="toast-container"></div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script src="app.js"></script>
    <script src="album.js"></script>
</body>

</html>
