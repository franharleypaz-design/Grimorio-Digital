<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grimorio MyL - El Portal del Abismo</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
</head>

<body>

    <header class="main-header">
        <div class="header-identity-block">
            <div class="logo-container" onclick="location.href='index.html'" style="cursor:pointer;">
                <img src="img/logo-Grimorio-digital.png" alt="Grimorio Digital" class="main-logo">
                <div class="logo-text">
                    <h1>GRIMORIO <span class="accent-on-light">DIGITAL</span></h1>
                    <p class="subtitle">SANTUARIO DE ESTRATEGIA</p>
                </div>
            </div>
        </div>

        <div class="header-action-block">
            <button id="btn-login">ASCENDER</button>

            <div id="user-logged" style="display: none;">
                <span id="display-name-text"></span>
                <img id="user-photo" class="avatar-header" src="img/avatar-default.png"
                    onclick="location.href='perfil.html'">
                <button id="btn-logout" class="btn-salir">SALIR</button>
            </div>
        </div>
    </header>

    <section class="portal-main">
        <div class="hero-block">
            <h2 class="hero-title">EL PORTAL DEL ABISMO</h2>
            <a href="biblioteca.html" class="btn-explorar-all">EXPLORAR BIBLIOTECA COMPLETA</a>
        </div>

        <div class="ediciones-grid">
            <h3>SELECCIONA UNA EDICIÓN</h3>
            <div class="nav-icons-container">
                <div class="edicion-item" onclick="location.href='biblioteca.html?edicion=espada-sagrada'">
                    <div class="icon-circle sword"></div>
                    <span>ESPADA SAGRADA</span>
                </div>
                <div class="edicion-item" onclick="location.href='biblioteca.html?edicion=helenica'">
                    <div class="icon-circle helmet"></div>
                    <span>HELÉNICA</span>
                </div>
                <div class="edicion-item" onclick="location.href='biblioteca.html?edicion=hijos-daana'">
                    <div class="icon-circle nature"></div>
                    <span>HIJOS DE DAANA</span>
                </div>
            </div>
        </div>
    </section>

    <div id="toast-container"></div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="app.js"></script>
</body>

</html>
