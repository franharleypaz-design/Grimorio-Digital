<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grimorio MyL - Biblioteca de Crónicas</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* Sincronización estética del botón de cierre idéntico al Grimorio */
        #close-detail {
            all: unset;
            position: absolute !important;
            top: 15px !important;
            right: 15px !important;
            width: 38px !important;
            height: 38px !important;
            border-radius: 50% !important;
            background: #d4af37 !important;
            border: 2px solid #000 !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            color: #000 !important;
            font-size: 22px !important;
            font-weight: bold !important;
            line-height: 1 !important;
            box-shadow: 0 0 12px rgba(0, 0, 0, 0.9) !important;
            z-index: 2100 !important;
            cursor: pointer !important;
            transition: 0.3s ease !important;
            padding: 0;
            margin: 0;
        }

        #close-detail:hover {
            transform: scale(1.1) rotate(90deg) !important;
            background: #fff !important;
            box-shadow: 0 0 18px rgba(212, 175, 55, 0.9) !important;
        }

        /* Clase para el botón dorado del Santuario (Consistencia con Perfil) */
        .btn-dorado-santuario {
            background: linear-gradient(to bottom, #d4af37, #b8860b) !important;
            color: #000 !important;
            border: 1px solid #fff !important;
            padding: 10px 20px !important;
            font-family: 'Cinzel', serif !important;
            font-weight: bold !important;
            font-size: 0.8rem !important;
            cursor: pointer !important;
            text-transform: uppercase !important;
            border-radius: 4px !important;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4), inset 0 0 5px rgba(255,255,255,0.5) !important;
            transition: 0.3s !important;
            letter-spacing: 1px !important;
            display: inline-flex !important;
            align-items: center !important;
            justify-content: center !important;
            gap: 8px !important;
            text-decoration: none !important;
            min-width: 220px;
        }

        .btn-dorado-santuario:hover {
            background: #fff !important;
            color: #000 !important;
            box-shadow: 0 0 20px var(--accent) !important;
            transform: translateY(-2px) !important;
        }

        /* Ajuste del contenedor de contenido para permitir el botón absoluto */
        .detail-content {
            position: relative;
            width: 100%;
            display: flex;
            flex-direction: column;
        }
    </style>
</head>

<body class="body-biblioteca">

    <header class="main-header">
        <div class="header-identity-block">
            <div class="logo-container" onclick="location.href='index.html'" style="cursor:pointer;">
                <img src="logo-fenix.png" alt="Fénix MyL" class="main-logo">
                <div class="logo-text">
                    <h1>GRIMORIO DE <span class="accent-on-light">MITOLOGÍA</span></h1>
                    <p class="subtitle">PRIMERA ERA Y PRIMER BLOQUE</p>
                </div>
            </div>
        </div>

        <div class="header-action-block">
            <button id="btn-login">ASCENDER</button>

            <div id="user-logged" style="display: none;">
                <span id="display-name-text"></span>
                <img id="user-photo" class="avatar-header" src="img/avatar-default.png"
                    onclick="location.href='perfil.html'" title="Mi Perfil" style="cursor: pointer;"
                    onerror="this.src='img/avatar-default.png'; this.onerror=null;">
                <button id="btn-logout" class="btn-salir">SALIR</button>
            </div>
        </div>
    </header>

    <div class="main-layout" id="main-library">

        <aside class="sidebar" id="sidebar">

            <section class="filter-group">
                <h3>EDICIONES</h3>
                <ul class="filter-list">
                    <li><label><input type="checkbox" value="espada-sagrada"> ESPADA SAGRADA</label></li>
                    <li><label><input type="checkbox" value="helenica"> HELÉNICA</label></li>
                    <li><label><input type="checkbox" value="hijos-daana"> HIJOS DE DAANA</label></li>
                </ul>
            </section>

            <section class="filter-group">
                <h3>TIPOS DE CARTA</h3>
                <ul class="filter-list">
                    <li><label><input type="checkbox" value="aliado"> ALIADO</label></li>
                    <li><label><input type="checkbox" value="totem"> TÓTEM</label></li>
                    <li><label><input type="checkbox" value="talisman"> TALISMÁN</label></li>
                    <li><label><input type="checkbox" value="oro"> ORO</label></li>
                    <li><label><input type="checkbox" value="arma"> ARMA</label></li>
                </ul>
            </section>

            <section class="filter-group">
                <h3>ESTADÍSTICAS</h3>
                <div class="range-container">
                    <label>Coste Máx: <span id="val-coste">10</span></label>
                    <input type="range" id="filter-coste" min="0" max="10" value="10" oninput="filtrarCartas()">
                </div>
                <div class="range-container">
                    <label>Fuerza Mín: <span id="val-fuerza">0</span></label>
                    <input type="range" id="filter-fuerza" min="0" max="12" value="0" oninput="filtrarCartas()">
                </div>
            </section>

            <section class="filter-group">
                <h3>RAZAS</h3>
                <select id="raza-filter" onchange="filtrarCartas()">
                    <option value="">Todas las razas</option>
                    <option value="caballero">Caballero</option>
                    <option value="dragon">Dragón</option>
                    <option value="faerie">Faerie</option>
                    <option value="sombra">Sombra</option>
                    <option value="ancestral">Ancestral</option>
                    <option value="guerrero">Guerrero</option>
                    <option value="sacerdote">Sacerdote</option>
                    <option value="bestia">Bestia</option>
                </select>
            </section>
        </aside>

        <main class="content">
            <div class="top-search-bar">
                <div class="search-wrapper">
                    <div class="input-container">
                        <input type="text" id="main-search" placeholder="Buscar por nombre o habilidad...">
                        <button id="clear-search" title="Limpiar búsqueda">×</button>
                    </div>
                    <div id="contenedor-boton-santuario"></div>
                </div>
            </div>

            <div id="results-info">REGISTROS HALLADOS: <span id="card-count">0</span></div>
            <div class="card-grid" id="card-display"></div>
        </main>
    </div>

    <div id="card-detail-panel" class="detail-panel">
        <div class="detail-content">
            <button id="close-detail" aria-label="Cerrar">×</button>

            <img src="" id="detail-img">
            <h2 id="detail-name"></h2>
            <p id="detail-type"></p>

            <div class="detail-references">
                <span id="detail-id">#000</span>
                <span id="detail-edition">EDICIÓN</span>
            </div>

            <div class="detail-hability" id="detail-text"></div>

            <div id="save-button-container"></div>

            <p id="detail-illustrator" class="detail-illustrator"></p>

            <div id="related-cards-section" style="margin-top: 20px; width: 100%; display: none;">
                <p style="font-size: 0.7rem; color: #888; margin-bottom: 10px; letter-spacing: 1px;">CARTAS REFERENCIALES:</p>
                <div id="related-buttons-container"
                    style="display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;">
                </div>
            </div>
        </div>
    </div>

    <div id="toast-container"></div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="app.js"></script>
</body>

</html>
