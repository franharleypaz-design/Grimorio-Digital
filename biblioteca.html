<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grimorio MyL - Biblioteca de Crónicas</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="banner.css?v=1102">
    <link rel="stylesheet" href="biblioteca.css">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Cinzel:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        /* 1. BLINDAJE DE CARGA: Escondemos todo por defecto */
        #btn-login, #user-logged {
            display: none !important;
            opacity: 0;
        }

        /* 2. REVELACIÓN: Solo el JS activará estas clases */
        #btn-login.auth-ready {
            display: inline-block !important;
            opacity: 1 !important;
        }

        #user-logged.auth-ready {
            display: flex !important;
            opacity: 1 !important;
        }

        /* AJUSTE DE CAPAS Y POSICIÓN DEL LOGO */
        .main-header { position: relative; z-index: 10001; cursor: default; }
        .top-bar-left { position: relative; height: 100%; flex: 1; }
        
        .logo-click-area {
            display: block;
            position: absolute;
            top: 0;
            left: 80px; 
            width: 300px; 
            height: 80px;
            cursor: pointer;
            z-index: 100;
        }

        .top-bar-right { 
            position: relative; 
            z-index: 20000 !important; 
            cursor: default;
            display: flex;
            align-items: center;
            gap: 15px;
        }
    </style>
</head>

<body class="body-biblioteca">

    <header class="main-header">
        <div class="top-bar-container">
            <div class="top-bar-left">
                <a href="index.html" class="logo-click-area" title="Volver al Inicio"></a>
            </div>

            <div class="top-bar-right" onclick="event.stopPropagation();">
                <button id="btn-login" class="btn-místico">ASCENDER</button>

                <div id="user-logged">
                    <span id="display-name-text">...</span>
                    <img id="user-photo" class="avatar-header" src="img/avatar-default.png" alt="Avatar">

                    <div class="user-dropdown-menu" id="user-dropdown">
                        <div class="dropdown-header-ms">
                            <span style="font-weight: 700; color: #666; font-size: 0.8rem;">GRIMORIO DIGITAL</span>
                            <button id="btn-logout" class="btn-cerrar-sesion-ms">Cerrar sesión</button>
                        </div>

                        <div class="dropdown-body-ms">
                            <img id="user-photo-large" class="avatar-large-ms" src="img/avatar-default.png" alt="Avatar">
                            <div class="user-info-ms">
                                <h4 id="user-full-name">Gladiador</h4>
                                <p id="user-email">...</p>
                                <a href="perfil.html" class="link-cuenta-ms">Mi cuenta de Grimorio</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <div class="main-layout" id="main-library">

        <aside class="sidebar" id="sidebar">
            <section class="filter-group">
                <h3>ERA / BLOQUE</h3>
                <ul class="filter-list">
                    <li><label class="radio-container"><input type="radio" name="era" value="primera_era" class="filter-era"> <span class="checkmark"></span> 1ª ERA</label></li>
                    <li><label class="radio-container"><input type="radio" name="era" value="primer_bloque" class="filter-era"> <span class="checkmark"></span> 1º BLOQUE</label></li>
                </ul>
            </section>

            <section class="filter-group disabled" id="section-ediciones">
                <h3>EDICIONES</h3>
                <ul id="lista-ediciones" class="filter-list">
                    <p class="placeholder-text">Selecciona un formato arriba...</p>
                </ul>
            </section>

            <section class="filter-group disabled" id="section-expansiones">
                <h3>EXPANSIÓN</h3>
                <ul id="lista-expansiones" class="filter-list">
                    <p class="placeholder-text">Selecciona una edición...</p>
                </ul>
            </section>

            <section class="filter-group">
                <h3>TIPO DE CARTA</h3>
                <ul class="filter-list">
                    <li><label class="radio-container"><input type="radio" name="tipo_carta" value="aliado" class="filter-type"> <span class="checkmark"></span> ALIADO</label></li>
                    <li><label class="radio-container"><input type="radio" name="tipo_carta" value="talisman" class="filter-type"> <span class="checkmark"></span> TALISMÁN</label></li>
                    <li><label class="radio-container"><input type="radio" name="tipo_carta" value="totem" class="filter-type"> <span class="checkmark"></span> TÓTEM</label></li>
                    <li><label class="radio-container"><input type="radio" name="tipo_carta" value="arma" class="filter-type"> <span class="checkmark"></span> ARMA</label></li>
                    <li><label class="radio-container"><input type="radio" name="tipo_carta" value="oro" class="filter-type"> <span class="checkmark"></span> ORO</label></li>
                    <li><label class="radio-container"><input type="radio" name="tipo_carta" value="monumento" class="filter-type"> <span class="checkmark"></span> MONUMENTO</label></li>
                </ul>
            </section>

            <section class="filter-group disabled" id="section-raza">
                <h3>RAZA</h3>
                <select id="raza-filter" class="form-control-místico">
                    <option value="">Todas las razas</option>
                    <option value="caballero">Caballero</option>
                    <option value="dragon">Dragón</option>
                    <option value="faerie">Faerie</option>
                    <option value="sombra">Sombra</option>
                    <option value="ancestral">Ancestral</option>
                    <option value="guerrero">Guerrero</option>
                    <option value="sacerdote">Sacerdote</option>
                    <option value="bestia">Bestia</option>
                </select>
            </section>
        </aside>

        <main class="content">
            <div class="top-search-bar">
                <div class="search-wrapper">
                    <div class="input-container">
                        <input type="text" id="main-search" placeholder="BUSCAR POR NOMBRE, HABILIDAD O C:5 F:2...">
                        <button id="btn-clear-search" title="Limpiar búsqueda">×</button>
                    </div>
                    <div id="contenedor-boton-santuario">
                        <button class="btn-dorado-santuario" onclick="location.href='grimorio.html'">VOLVER A MI GRIMORIO</button>
                    </div>
                </div>
            </div>

            <div id="results-info">REGISTROS HALLADOS: <span id="card-count">0</span></div>
            <div class="card-grid" id="card-display"></div>
        </main>
    </div>

    <div id="card-detail-panel" class="detail-panel">
        <div class="detail-content">
            <button id="close-detail" aria-label="Cerrar">×</button>
            <img src="" id="detail-img">
            <h2 id="detail-name"></h2>
            <p id="detail-type"></p>
            <div class="detail-references">
                <span id="detail-id">#000</span>
                <span id="detail-edition">EDICIÓN</span>
            </div>
            <div class="detail-hability" id="detail-text"></div>
            <div id="save-button-container" class="folder-actions-row"></div>
            <p id="detail-illustrator" class="detail-illustrator"></p>
            <div id="related-cards-section" style="margin-top: 20px; width: 100%; display: none;">
                <p class="related-title">CARTAS REFERENCIALES:</p>
                <div id="related-buttons-container" style="display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;"></div>
            </div>
        </div>
    </div>

    <div id="toast-container"></div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script src="app.js"></script>
    <script src="filtros.js"></script>
    <script src="biblioteca.js"></script>

    <script>
        const capsule = document.getElementById('user-logged');
        const menu = document.getElementById('user-dropdown');

        if (capsule && menu) {
            capsule.addEventListener('click', (e) => {
                if (e.target.closest('#btn-logout') || e.target.closest('.link-cuenta-ms')) return;
                e.preventDefault();
                e.stopPropagation();
                menu.classList.toggle('active');
            });
        }

        document.addEventListener('click', (e) => {
            if (menu && menu.classList.contains('active')) {
                if (!menu.contains(e.target) && !capsule.contains(e.target)) {
                    menu.classList.remove('active');
                }
            }
        });
    </script>
</body>

</html>
